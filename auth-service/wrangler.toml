name = "onedrive-auth-service"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
# Set your Microsoft Client ID here or via wrangler secret
# MICROSOFT_CLIENT_ID = "your-client-id"

# KV namespace for storing encrypted refresh tokens
[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "your-kv-namespace-id"

# For local development
# [[kv_namespaces]]
# binding = "AUTH_TOKENS"
# id = "your-kv-namespace-id"
# preview_id = "your-preview-kv-namespace-id"
